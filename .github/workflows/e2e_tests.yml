namespace Lizmap\Project\Qgis;

use Lizmap\App\XmlTools; // Keep use statement for context

/**
 * QGIS Project Visibility preset class.
 *
 * @property string                              $name
 * @property array<ProjectVisibilityPresetLayer> $layers
 * @property array<string>                       $checkedGroupNodes
 * @property array<string>                       $expandedGroupNodes
 * @property array<string, array<string>>        $checkedLegendNodes
 */
class ProjectVisibilityPreset extends BaseQgisObject
{
    /** @var array<string> The instance properties */
    protected $properties = array(
        'name',
        'layers',
        'checkedGroupNodes',
        'expandedGroupNodes',
        'checkedLegendNodes',
    );

    /** @var array<string> The not null properties */
    protected $mandatoryProperties = array(
        'name',
        'layers',
    );

    protected function set(array $data): void
    {
        if (!array_key_exists('checkedGroupNodes', $data)) {
            $data['checkedGroupNodes'] = array();
        }
        if (!array_key_exists('expandedGroupNodes', $data)) {
            $data['expandedGroupNodes'] = array();
        }
        if (!array_key_exists('checkedLegendNodes', $data)) {
            $data['checkedLegendNodes'] = array();
        }
        if (!array_key_exists('layers', $data)) {
            $data['layers'] = array();
        }
        parent::set($data);
    }

    /**
     * @return self
     */
    public static function fromXmlReader(\XMLReader $oXmlReader, array $context = array())
    {
        $data = array();

        // Ensure arrays exist to avoid undefined offset issues
        $data['layers'] = array();
        $data['checkedGroupNodes'] = array();
        $data['expandedGroupNodes'] = array();
        $data['checkedLegendNodes'] = array();

        // Name attribute on the visibility preset element
        $data['name'] = $oXmlReader->getAttribute('name');

        // Retrieve QGIS project version from context if provided
        $qgisProjectVersion = $context['qgisProjectVersion'] ?? 0;

        // Depth of the current element (visibility preset start)
        $startDepth = $oXmlReader->depth;

        // Helper closures for matching various possible tag names
        $matchesAny = function (\XMLReader $r, array $names): bool {
            $local = $r->localName;
            foreach ($names as $n) {
                if ($local === $n) {
                    return true;
                }
            }
            return false;
        };

        // Allowed variants for names we need to detect
        $visibilityNames = array('visibility-preset', 'visibilityPreset', 'visibilitypreset');
        $checkedLegendNodesNames = array('checked-legend-nodes', 'checkedLegendNodes', 'checkedlegendnodes');
        $checkedLegendNodeNames = array('checked-legend-node', 'checkedLegendNode', 'checkedlegendnode');

        // Read children of the visibility preset
        while ($oXmlReader->read()) {
            // If we hit the end element for the visibility preset, break.
            if ($oXmlReader->nodeType === \XMLReader::END_ELEMENT
                && $oXmlReader->depth === $startDepth
                && $matchesAny($oXmlReader, $visibilityNames)) {
                break;
            }

            // We only care about element nodes directly inside the preset (one level deeper)
            if ($oXmlReader->nodeType !== \XMLReader::ELEMENT) {
                continue;
            }

            if ($oXmlReader->depth !== $startDepth + 1) {
                // skip nested deeper nodes here — they will be handled by inner loops
                continue;
            }

            $tagName = $oXmlReader->localName;

            // ---------- <layer> ----------
            if ($tagName === 'layer') {
                $visibleAttr = $oXmlReader->getAttribute('visible');
                $expandedAttr = $oXmlReader->getAttribute('expanded');

                // Only skip if explicitly marked as '0' (unchecked/invisible).
                // Some QGIS versions omit the attribute when visible by default.
                if ($visibleAttr === '0') {
                    // Skip this layer entirely
                    continue;
                }

                $layerData = array(
                    'id' => $oXmlReader->getAttribute('id'),
                    'visible' => filter_var($visibleAttr, FILTER_VALIDATE_BOOLEAN, FILTER_NULL_ON_FAILURE),
                    'style' => $oXmlReader->getAttribute('style'),
                    'expanded' => filter_var($expandedAttr, FILTER_VALIDATE_BOOLEAN, FILTER_NULL_ON_FAILURE),
                );

                $data['layers'][] = new ProjectVisibilityPresetLayer($layerData);

            // ---------- <checked-group-node> ----------
            } elseif ($tagName === 'checked-group-node') {
                $id = $oXmlReader->getAttribute('id');
                if ($id !== null && $id !== '') {
                    $data['checkedGroupNodes'][] = $id;
                }

            // ---------- <expanded-group-node> ----------
            } elseif ($tagName === 'expanded-group-node') {
                $id = $oXmlReader->getAttribute('id');
                if ($id !== null && $id !== '') {
                    $data['expandedGroupNodes'][] = $id;
                }

            // ---------- <checked-legend-nodes> (or variants) ----------
            } elseif (in_array($tagName, $checkedLegendNodesNames, true)) {

                // If empty element, nothing to process
                if ($oXmlReader->isEmptyElement) {
                    continue;
                }

                $layerId = $oXmlReader->getAttribute('id') ?? '';
                $legendNodeDepth = $oXmlReader->depth;

                // Defensive: ensure layerId is set; otherwise skip grouping
                if ($layerId === '') {
                    // consume inner nodes until closing element to keep the reader in sync
                    while ($oXmlReader->read()) {
                        if ($oXmlReader->nodeType === \XMLReader::END_ELEMENT
                            && $oXmlReader->depth === $legendNodeDepth
                            && in_array($oXmlReader->localName, $checkedLegendNodesNames, true)) {
                            break;
                        }
                    }
                    continue;
                }

                $legendNodes = array();

                // Loop inside checked-legend-nodes block
                while ($oXmlReader->read()) {
                    // If we reached the closing of this checked-legend-nodes element, break
                    if ($oXmlReader->nodeType === \XMLReader::END_ELEMENT
                        && $oXmlReader->depth === $legendNodeDepth
                        && in_array($oXmlReader->localName, $checkedLegendNodesNames, true)) {
                        break;
                    }

                    // We only care about element nodes for legend entries
                    if ($oXmlReader->nodeType !== \XMLReader::ELEMENT) {
                        continue;
                    }

                    // Accept variants for checked-legend-node
                    if (in_array($oXmlReader->localName, $checkedLegendNodeNames, true)) {
                        $nodeId = $oXmlReader->getAttribute('id');
                        if ($nodeId !== null && $nodeId !== '') {
                            $legendNodes[] = $nodeId;
                        }
                    }
                }

                if (!empty($legendNodes)) {
                    $data['checkedLegendNodes'][$layerId] = $legendNodes;
                }
            }

            // other tags are ignored (forward compatibility)
        }

        return new ProjectVisibilityPreset($data);
    }

    /**
     * Retrieve the object data as an array keyed by preset name.
     *
     * @return array<string, array<string, mixed>>
     */
    public function toKeyArray(): array
    {
        return array(
            $this->name => array(
                'layers' => $this->layers,
                'checkedGroupNodes' => $this->checkedGroupNodes,
                'expandedGroupNodes' => $this->expandedGroupNodes,
                'checkedLegendNodes' => $this->checkedLegendNodes,
            ),
        );
    }
}
